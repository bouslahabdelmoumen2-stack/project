<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>bobo — ريلز</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body data-user='{{ user | tojson }}' style="background:#000;">

  <div class="reels-shell">
    <header class="reels-top-bar">
      <span class="bobo-logo">bobo</span>
      <span style="font-family:var(--font-display); font-weight:700; font-size:15px; color:#fff;">ريلز</span>
      <button class="icon-btn brand" id="uploadReelBtn" title="أضف ريلز">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </header>

    <div class="reels-feed" id="reelsFeed">
      <div class="text-center" style="color:var(--text-muted); padding:40vh 0;" id="reelsLoading">جاري تحميل الريلز...</div>
    </div>

    <nav class="bottom-nav reels-nav">
      <a href="/feed" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>
        الرئيسية
      </a>
      <a href="/reels" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="m10 9 5 3-5 3Z"/></svg>
        ريلز
      </a>
      <a href="/messenger" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        الدردشات
      </a>
    </nav>
  </div>

  <!-- ===== نافذة رفع ريلز جديد ===== -->
  <div class="modal-overlay" id="reelModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h3>ريلز جديد</h3>
        <button class="icon-btn" id="closeReelModalBtn">✕</button>
      </div>
      <label class="attach-btn" style="width:100%; justify-content:center; padding:20px; margin-bottom:12px;">
        🎬 اختر فيديو (mp4, webm, mov)
        <input type="file" id="reelVideoInput" accept="video/*" class="hidden">
      </label>
      <div id="videoPreviewWrap" class="hidden" style="margin-bottom:12px;">
        <video id="videoPreview" style="width:100%; border-radius:16px; max-height:260px;" controls muted></video>
      </div>
      <textarea id="reelCaption" placeholder="اكتب وصفًا للريلز..." style="min-height:60px;"></textarea>
      <button class="btn-primary" id="submitReelBtn">نشر الريلز</button>
    </div>
  </div>

  <!-- ===== نافذة تعليقات الريلز ===== -->
  <div class="modal-overlay" id="reelCommentsModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h3>التعليقات</h3>
        <button class="icon-btn" id="closeCommentsModalBtn">✕</button>
      </div>
      <div id="reelCommentsList" style="display:flex; flex-direction:column; gap:10px; max-height:45vh; overflow-y:auto;"></div>
      <div style="display:flex; gap:8px; margin-top:14px;">
        <input type="text" id="reelCommentInput" placeholder="اكتب تعليقًا..."
          style="flex:1; background:var(--bg-elevated-2); border:1px solid var(--border-subtle); border-radius:999px; padding:11px 16px; color:var(--text-primary); font-size:13.5px; text-align:right;">
        <button class="send-btn" id="sendReelCommentBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='js/socket-client.js') }}"></script>
  <script src="{{ url_for('static', filename='js/reels.js') }}"></script>
</body>
</html>
