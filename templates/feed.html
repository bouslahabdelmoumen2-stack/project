<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>bobo — الرئيسية</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body data-user='{{ user | tojson }}'>
  <div class="app-shell">

    <!-- ===== الشريط العلوي ===== -->
    <header class="top-nav">
      <span class="bobo-logo">bobo</span>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="ابحث عن أشخاص أو منشورات...">
      </div>
      <button class="icon-btn brand" id="openComposerBtn" title="إنشاء منشور">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" title="الإشعارات">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <a href="/messenger" class="avatar" id="profileAvatar" style="width:40px;height:40px;"></a>
    </header>

    <!-- ===== شريط القصص ===== -->
    <div class="stories-tray" id="storiesTray">
      <div class="story-item story-add" id="addStoryBtn">
        <div class="story-ring">
          <div class="avatar" id="myStoryAvatar" style="width:100%;height:100%;">
            <span class="plus-icon">+</span>
          </div>
        </div>
        <span>قصتك</span>
      </div>
      <!-- باقي القصص تُضاف هنا عبر JS -->
    </div>

    <!-- ===== الخلاصة ===== -->
    <main class="feed" id="feedContainer">
      <div class="composer-shortcut" id="composerShortcut">
        <div class="avatar" id="composerAvatar" style="width:40px;height:40px;"></div>
        <input type="text" placeholder="بماذا تفكر؟" readonly>
      </div>
      <!-- المنشورات تُضاف هنا عبر JS -->
      <div id="postsLoading" class="text-center" style="color:var(--text-muted); padding:24px;">جاري تحميل المنشورات...</div>
    </main>
  </div>

  <!-- ===== شريط التنقل السفلي ===== -->
  <nav class="bottom-nav">
    <a href="/feed" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>
      الرئيسية
    </a>
    <a href="/reels" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="m10 9 5 3-5 3Z"/></svg>
      ريلز
    </a>
    <a href="/messenger" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      الدردشات
    </a>
    <a href="#" class="nav-item" id="logoutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      خروج
    </a>
  </nav>

  <!-- ===== نافذة إنشاء منشور ===== -->
  <div class="modal-overlay" id="composerModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h3>إنشاء منشور</h3>
        <button class="icon-btn" id="closeComposerBtn">✕</button>
      </div>
      <textarea id="postContent" placeholder="بماذا تفكر يا صديقي؟"></textarea>
      <div class="image-preview-wrap hidden" id="imagePreviewWrap">
        <img id="imagePreview">
        <button class="remove-image-btn" id="removeImageBtn">✕</button>
      </div>
      <div class="attach-row">
        <label class="attach-btn">
          📷 صورة
          <input type="file" id="postImageInput" accept="image/*" class="hidden">
        </label>
      </div>
      <button class="btn-primary" id="submitPostBtn">نشر</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='js/socket-client.js') }}"></script>
  <script src="{{ url_for('static', filename='js/feed.js') }}"></script>
</body>
</html>
